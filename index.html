<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Under Construction</title>
  <link rel="icon" href="/assets/alien.ico" type="image/x-icon">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
      color: #2d3748;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .card {
      max-width: 720px;
      width: 100%;
      background: #ffffff;
      border-radius: 18px;
      padding: 48px 32px;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.10);
    }
    .eyebrow {
      color: #2c5282;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.85rem;
      margin-bottom: 14px;
      font-weight: 700;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      margin-bottom: 18px;
      color: #1a365d;
    }
    p {
      font-size: 1.08rem;
      color: #4a5568;
      margin-bottom: 14px;
    }
    .status {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 16px;
      border-radius: 999px;
      background: #ebf8ff;
      color: #2c5282;
      font-weight: 600;
      border: 1px solid #bee3f8;
    }
    footer {
      margin-top: 28px;
      font-size: 0.92rem;
      color: #718096;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">dev environment</div>
    <h1>Under construction</h1>
    <p>I’m rebuilding this space right now.</p>
    <p>Things may change quickly while work is in progress.</p>
    <div class="status">Check back soon</div>
    <footer>© 2026 Leo Varela</footer>
  </main>
</body>
</html>
